<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Oras Click • متجر إلكتروني</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        /* CSS المدمج */
        :root { --primary: #6366f1; --bg: #f8f7ff; --text: #1e1b4b; --card: #ffffff; --border: rgba(99,102,241,0.15); }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        .navbar { padding: 20px; display: flex; justify-content: space-between; align-items: center; background: white; border-bottom: 1px solid var(--border); }
        .main { max-width: 1200px; margin: 20px auto; padding: 20px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .product-card { background: var(--card); padding: 20px; border-radius: 16px; border: 1px solid var(--border); transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn { padding: 10px 20px; border-radius: 8px; cursor: pointer; border: none; background: var(--primary); color: white; font-weight: bold; }
        .cart-drawer { position: fixed; top:0; right:-400px; width:350px; height:100%; background:white; transition: 0.4s; padding:20px; box-shadow: -5px 0 15px rgba(0,0,0,0.1); z-index:1000; }
        .cart-drawer.open { right: 0; }
        .modal-overlay { position: fixed; inset:0; background:rgba(0,0,0,0.5); display:none; justify-content:center; align-items:center; z-index:2000; }
        .modal-overlay.open { display:flex; }
        .modal { background:white; padding:30px; border-radius:16px; width:90%; max-width:400px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <h1>Oras Click</h1>
        <button class="btn" onclick="Store.openCart()">🛒 السلة (<span id="cart-badge">0</span>)</button>
    </nav>

    <main class="main">
        <input type="text" id="search-input" placeholder="ابحث عن منتج..." style="padding:10px; width:100%; margin-bottom:20px;">
        <div class="products-grid" id="products-grid"></div>
    </main>

    <div class="cart-drawer" id="cart-drawer">
        <button onclick="Store.closeCart()">إغلاق</button>
        <div id="cart-items"></div>
        <button class="btn" id="checkout-btn" onclick="Store.checkout()" disabled>✅ إتمام الطلب</button>
    </div>

    <div class="modal-overlay" id="checkout-modal">
        <div class="modal">
            <h3>بيانات الطلب</h3>
            <input type="text" id="client-name" placeholder="الاسم" style="width:100%; margin:10px 0; padding:10px;">
            <input type="tel" id="client-phone" placeholder="الهاتف" style="width:100%; margin:10px 0; padding:10px;">
            <button class="btn" onclick="Store.sendOrder()">إرسال إلى واتساب</button>
        </div>
    </div>

    <script>
        const Store = {
            products: [
                { id: 1, name: "هاتف OnePlus Ace 5 Ultra", price: 85000 },
                { id: 2, name: "حذاء رياضي", price: 12000 },
                { id: 3, name: "حقيبة ظهر", price: 8500 }
            ],
            cart: [],
            
            init() {
                const grid = document.getElementById('products-grid');
                grid.innerHTML = this.products.map(p => `
                    <div class="product-card">
                        <h3>${p.name}</h3>
                        <p>${p.price} دج</p>
                        <button class="btn" onclick="Store.addToCart(${p.id})">إضافة</button>
                    </div>
                `).join('');
            },

            addToCart(id) {
                this.cart.push(this.products.find(p => p.id === id));
                document.getElementById('cart-badge').innerText = this.cart.length;
                document.getElementById('checkout-btn').disabled = false;
                alert("تمت الإضافة!");
            },

            openCart() { document.getElementById('cart-drawer').classList.add('open'); },
            closeCart() { document.getElementById('cart-drawer').classList.remove('open'); },
            checkout() { document.getElementById('checkout-modal').classList.add('open'); },
            
            sendOrder() {
                const name = document.getElementById('client-name').value;
                const phone = document.getElementById('client-phone').value;
                const items = this.cart.map(p => p.name).join(', ');
                const msg = `طلب جديد: الاسم ${name}، الهاتف ${phone}، المنتجات: ${items}`;
                window.open(`https://wa.me/213558592542?text=${encodeURIComponent(msg)}`, '_blank');
                this.closeCart();
                document.getElementById('checkout-modal').classList.remove('open');
                this.cart = [];
                document.getElementById('cart-badge').innerText = '0';
            }
        };
        Store.init();
    </script>
</body>
</html>
